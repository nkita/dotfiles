gui:
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - "#1a3a5a"
    selectedRangeBgColor:
      - "#1a3a5a"
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --side-by-side
os:
  editCommand: 'nvim'
  editCommandTemplate: '{{editor}} {{filename}}'
